server:
  port: ${PORT:8080}
  servlet:
    context-path: /api/v1

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/vikisol_one}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      # 5 was too small for real usage - every DB-writing @Async call (e.g. EmailLogService.log,
      # which deliberately uses REQUIRES_NEW so it always needs its OWN connection on top of
      # whatever transaction is already open) adds concurrent connection demand on top of normal
      # request traffic. Under any real concurrency this pool exhausted, and any request unlucky
      # enough to need a connection while it was full failed outright with a raw
      # "Could not open JPA EntityManager for transaction" error - including plain login.
      maximum-pool-size: 10
      # Deliberately kept LOW (not raised alongside max-pool-size): by default Hikari tries to
      # eagerly establish `minimum-idle` connections the instant the pool is created, during
      # application startup - and by default a failure there (a momentarily tight DB connection
      # ceiling, a slow-to-accept-connections DB right after a redeploy, etc.) throws
      # PoolInitializationException and crashes the whole Spring context before the app ever binds
      # its port, which fails the health check outright. A low minimum-idle keeps startup's own
      # connection demand small; the pool still grows lazily up to maximum-pool-size under real
      # traffic once the app is actually up.
      minimum-idle: 2
      # Don't let a slow/transient DB at boot crash startup entirely - retry lazily on first real
      # query instead of treating pool warm-up failure as fatal.
      initialization-fail-timeout: -1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

resend:
  api-key: ${RESEND_API_KEY:}
  from: ${RESEND_FROM:Vikisol One <connect@vikisol.in>}
  bcc: ${RESEND_BCC:connect@vikisol.in}
  support-email: ${RESEND_SUPPORT_EMAIL:connect@vikisol.in}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}
  root-folder: ${CLOUDINARY_ROOT_FOLDER:vikisol-one}

app:
  logo-url: ${LOGO_URL:https://res.cloudinary.com/drqgvncx1/image/upload/v1781621022/snipped_fccgpm.png}
  frontend-url: ${FRONTEND_URL:https://hrlms.vikisol.in}

  # No fallback on purpose, same reasoning as jwt.secret below - integration secrets (Azure AD
  # client secret, etc.) encrypted with a well-known dev key would be effectively unencrypted.
  integration-encryption-key: ${INTEGRATION_ENCRYPTION_KEY}

  jwt:
    # No fallback default on purpose - a hardcoded secret baked into source control (even as a
    # "safety net") is a real vulnerability: anyone with repo access could forge valid tokens for
    # any user, including CEO, in any environment that forgot to set this. Fail fast instead.
    secret: ${JWT_SECRET}
    # Fallback only - the real access-token TTL is AuthSettingsDto.sessionTimeoutMinutes (CEO-
    # configurable at runtime, default 15 min).
    expiration-ms: 900000
    # No longer read anywhere - refresh-token TTLs are now fixed constants in AuthService
    # (12h default / 30d remember-me). Left in place harmlessly.
    refresh-expiration-ms: 604800000

  cors:
    allowed-origins: ${CORS_ORIGINS:https://hrlms.vikisol.in,https://vikisol-one-hrlms.vercel.app}

arena:
  webhook:
    # No fallback in prod - same rationale as the JWT secret above.
    api-key: ${ARENA_WEBHOOK_API_KEY}

assessment:
  pass-threshold-percent: ${ASSESSMENT_PASS_THRESHOLD:60}

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: never
  health:
    mail:
      enabled: false

logging:
  level:
    root: WARN
    com.vikisol: INFO
  pattern:
    console: "%d{HH:mm:ss} %-5level %logger{36} - %msg%n"
