server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/vikisol_one}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

resend:
  api-key: ${RESEND_API_KEY:}
  from: ${RESEND_FROM:Vikisol One <connect@vikisol.in>}
  bcc: ${RESEND_BCC:connect@vikisol.in}
  support-email: ${RESEND_SUPPORT_EMAIL:connect@vikisol.in}

app:
  logo-url: ${LOGO_URL:https://res.cloudinary.com/drqgvncx1/image/upload/v1781621022/snipped_fccgpm.png}

  file:
    upload-dir: ${UPLOAD_DIR:/tmp/vikisol-uploads}

  jwt:
    # No fallback default on purpose - a hardcoded secret baked into source control (even as a
    # "safety net") is a real vulnerability: anyone with repo access could forge valid tokens for
    # any user, including CEO, in any environment that forgot to set this. Fail fast instead.
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000

  cors:
    allowed-origins: ${CORS_ORIGINS:https://hrlms.vikisol.in,https://vikisol-one-hrlms.vercel.app}

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: never
  health:
    mail:
      enabled: false

logging:
  level:
    root: WARN
    com.vikisol: INFO
  pattern:
    console: "%d{HH:mm:ss} %-5level %logger{36} - %msg%n"
