server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: vikisol-one

  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:5432}/${DB_NAME:vikisol_one}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Welcome@12345#}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  file:
    upload-dir: ${UPLOAD_DIR:uploads}

  jwt:
    # Local-dev-only fallback (this file is never used in prod - see application-prod.yml, which
    # has no fallback and fails fast instead). Still, don't reuse this value anywhere real.
    secret: ${JWT_SECRET:local-dev-only-secret-do-not-use-in-any-deployed-environment}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000

  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
